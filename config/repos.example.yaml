# Copy to repos.yaml and add your team's repositories.
# Repos are pluggable: add or remove entries; only configured providers are used.

repos:
  # GitHub: use provider "github" and owner/repo
  - provider: github
    owner: your-org
    repo: your-repo

  # - provider: github
  #   owner: your-org
  #   repo: another-repo

# Optional: limit to PRs merged in the last N days (omit for no limit)
# sinceDays: 90

# Optional: cap merged PRs fetched per repo (reduces API calls and load time; omit for no limit)
# maxMergedPrsPerRepo: 100
